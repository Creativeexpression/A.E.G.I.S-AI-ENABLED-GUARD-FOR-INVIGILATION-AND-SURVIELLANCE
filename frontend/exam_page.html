<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Page</title>
</head>

<body>

<h2>Online Examination</h2>

<p id="sectionTitle">Section: Loading...</p>
<p id="progressText">Progress: 0/0</p>
<p id="timer">10:00</p>

<hr>

<h3 id="questionNumber">Question 0 of 0</h3>
<p id="questionText">Waiting for questions...</p>

<div id="optionsContainer"></div>

<br>

<button onclick="prevQuestion()">Previous</button>
<button onclick="markForReview()">Mark Review</button>
<button onclick="clearResponse()">Clear</button>
<button onclick="goToUnanswered()">First Unanswered</button>
<button onclick="nextQuestion()">Next</button>

<hr>

<h3>Sections</h3>
<div id="sectionContainer"></div>

<hr>

<h3>Questions</h3>
<div id="questionGrid"></div>

<br>

<button onclick="submitExam()">Submit Exam</button>

<script>

/* STRUCTURE (Backend-connected Proctored Quiz) */

let sections = [
    {
        name: "AI & Cybersecurity Basics",
        questions: [
            {
                text: "What does HTTPS stand for?",
                options: [
                    "Hypertext Transfer Protocol Standard",
                    "Hypertext Transfer Protocol Secure",
                    "Hypertext Transfer Process Secure",
                    "Hypertext Technology Protocol Safe"
                ],
                correctIndex: 1
            },
            {
                text: "Which port does SSH run on by default?",
                options: ["80", "443", "22", "21"],
                correctIndex: 2
            },
            {
                text: "What is the main purpose of multi-factor authentication (MFA)?",
                options: [
                    "Faster login convenience",
                    "To encrypt the local physical hard drive",
                    "To add multiple layers of authentication verification",
                    "To increase internet routing speeds"
                ],
                correctIndex: 2
            },
            {
                text: "What is the term for an attempt to steal credentials by sending malicious emails disguised as trustworthy entities?",
                options: ["Phishing", "Ransomware", "SQL Injection", "Distributed Denial of Service (DDoS)"],
                correctIndex: 0
            },
            {
                text: "Which neural network architecture is primarily used in proctoring systems for computer vision facial verification?",
                options: [
                    "Recurrent Neural Networks (RNN)",
                    "Convolutional Neural Networks (CNN)",
                    "Generative Adversarial Networks (GAN)",
                    "Long Short-Term Memory Networks (LSTM)"
                ],
                correctIndex: 1
            }
        ]
    }
];

let currentSection = 0
let currentQuestion = 0

let answers = JSON.parse(localStorage.getItem("answers")) || {}
let review = JSON.parse(localStorage.getItem("review")) || {}
let visited = {}

/* SAVE */

function saveState(){
localStorage.setItem("answers", JSON.stringify(answers))
localStorage.setItem("review", JSON.stringify(review))
}

/* RENDER SECTION */

function renderSection(){

let sec = sections[currentSection]

document.getElementById("sectionTitle").innerText =
`Section: ${sec.name}`

if(sec.questions.length === 0){
document.getElementById("questionText").innerText = "No questions available"
document.getElementById("optionsContainer").innerHTML = ""
document.getElementById("questionNumber").innerText = "Question 0 of 0"
updateGrid()
updateProgress()
return
}

renderQuestion()
}

/* RENDER QUESTION */

function renderQuestion(){

let sec = sections[currentSection]
let q = sec.questions[currentQuestion]

let key = `${currentSection}_${currentQuestion}`

visited[key] = true

document.getElementById("questionNumber").innerText =
`Question ${currentQuestion+1} of ${sec.questions.length}`

document.getElementById("questionText").innerText = q.text

let html = ""

q.options.forEach((opt,i)=>{

let checked = answers[key] === i ? "checked" : ""

html += `
<label style="display: block; margin: 10px 0; cursor: pointer;">
<input type="radio" name="option" ${checked} onclick="selectOption(${i})">
${opt}
</label>
`

})

document.getElementById("optionsContainer").innerHTML = html

updateGrid()
updateProgress()

}

/* SELECT */

function selectOption(i){
let key = `${currentSection}_${currentQuestion}`
answers[key] = i
saveState()
}

/* NAVIGATION */

function nextQuestion(){

let sec = sections[currentSection]

if(currentQuestion < sec.questions.length-1){
currentQuestion++
renderQuestion()
}

}

function prevQuestion(){

if(currentQuestion > 0){
currentQuestion--
renderQuestion()
}

}

/* SECTION SWITCH */

function switchSection(i){
currentSection = i
currentQuestion = 0
renderSection()
}

/* REVIEW */

function markForReview(){
let key = `${currentSection}_${currentQuestion}`
review[key] = true
saveState()
updateGrid()
}

/* CLEAR */

function clearResponse(){
let key = `${currentSection}_${currentQuestion}`
delete answers[key]
saveState()
renderQuestion()
}

/* GRID */

function updateGrid(){

let sec = sections[currentSection]
let html = ""

sec.questions.forEach((q,i)=>{

let key = `${currentSection}_${i}`

let status = ""

if(answers[key] !== undefined) status += "[Answered] "
if(review[key]) status += "[Review] "
if(visited[key]) status += "[Visited] "

html += `
<div style="display: inline-block; margin-right: 15px;">
<button onclick="jump(${i})">Q${i+1}</button> ${status}
</div>
`

})

document.getElementById("questionGrid").innerHTML = html

}

/* JUMP */

function jump(i){
currentQuestion = i
renderQuestion()
}

/* SECTION LIST */

function renderSections(){

let html = ""

sections.forEach((sec,i)=>{

html += `<button onclick="switchSection(${i})">${sec.name}</button> `

})

document.getElementById("sectionContainer").innerHTML = html

}

/* PROGRESS */

function updateProgress(){

let total = 0
let answeredCount = 0

sections.forEach((sec,si)=>{
sec.questions.forEach((q,qi)=>{
let key = `${si}_${qi}`
total++
if(answers[key] !== undefined) answeredCount++
})
})

document.getElementById("progressText").innerText =
`Progress: ${answeredCount}/${total}`

}

/* TIMER */

let time = 600

let timerInterval = setInterval(()=>{

let min = Math.floor(time/60)
let sec = time % 60

document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`

time--

if(time <= 0){
clearInterval(timerInterval)
submitExam()
}

},1000)

/* SUBMIT EXAM TO BACKEND */

function submitExam(){

let total = 0
let correctCount = 0
let answeredCount = 0

sections.forEach((sec,si)=>{
sec.questions.forEach((q,qi)=>{
let key = `${si}_${qi}`
total++
if(answers[key] !== undefined) {
    answeredCount++
    if(answers[key] === q.correctIndex) {
        correctCount++
    }
}
})
})

let confirmSubmit = confirm(
`You answered ${answeredCount}/${total} questions. Are you sure you want to submit the exam?`
)

if(!confirmSubmit) return;

clearInterval(timerInterval);

// Calculate score and accuracy percentage out of 100
let score = (correctCount / total) * 100
let percentage = (correctCount / total) * 100

// Get student details from localStorage
const studentData = JSON.parse(localStorage.getItem("studentData") || "{}")
const student_id = studentData.student_id

if(!student_id) {
    alert("Error: Student session not found. Please log in again.")
    window.location.href = "login.html"
    return
}

// Proctoring anomaly simulation
let tabSwitchCount = parseInt(localStorage.getItem("tabSwitchCount") || "0")
let detect_object = null
if (tabSwitchCount >= 2) {
    detect_object = "Cell phone" // Simulate that a mobile device was detected during tab switches
}

// Make network request to save grade
fetch("http://127.0.0.1:5000/update_score", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        student_id: student_id,
        score: score,
        percentage: percentage,
        detect_object: detect_object
    })
})
.then(response => {
    if (!response.ok) {
        throw new Error("Server responded with error status");
    }
    return response.json();
})
.then(data => {
    alert(`Exam Submitted successfully!\nScore: ${score.toFixed(1)}/100\nAccuracy: ${percentage.toFixed(1)}%${detect_object ? '\nProctoring Alert: Anomaly recorded!' : ''}`);
    // Clear quiz state from browser
    localStorage.removeItem("answers")
    localStorage.removeItem("review")
    localStorage.removeItem("tabSwitchCount")
    window.location.href = "student_dashboard.html"
})
.catch(err => {
    console.error("Submit Error:", err);
    alert("Failed to submit score to the backend server. Make sure the backend is active at http://127.0.0.1:5000.");
});

}

/* FIRST UNANSWERED */

function goToUnanswered(){

for(let si=0;si<sections.length;si++){
for(let qi=0;qi<sections[si].questions.length;qi++){

let key = `${si}_${qi}`

if(answers[key] === undefined){
currentSection = si
currentQuestion = qi
renderSection()
}

}
}

}

/* SECURITY & PROCTORING */

document.addEventListener("visibilitychange", ()=>{
if(document.hidden){
    let count = parseInt(localStorage.getItem("tabSwitchCount") || "0")
    count++
    localStorage.setItem("tabSwitchCount", count)
    alert(`Warning: Proctoring engine detected a tab switch! (Violation ${count})`)
}
})

document.addEventListener("contextmenu", e => e.preventDefault())

/* INIT */

renderSections()
renderSection()

</script>

</body>
</html>
